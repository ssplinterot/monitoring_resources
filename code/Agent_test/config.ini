[server]
; IP-адрес компьютера где запущен server.py
; Если агент и сервер на одной машине — оставь 127.0.0.1
; Если на разных — укажи реальный IP сервера, например: 192.168.1.100
ip = 127.0.0.1
port = 9090

[agent]
; Имя этого узла — будет отображаться в интерфейсе сервера
; По умолчанию берётся имя компьютера из системы
name = test_agent

; Как часто отправлять данные на сервер (в секундах)
send_interval = 2

; Сколько процессов показывать в топе
top_n = 5